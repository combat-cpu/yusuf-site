<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yusuf-Sami Karpuz</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #0a0a0a;
        color: #f5f5f5;
      }
      .wrap {
        max-width: 960px;
        margin: 0 auto;
        padding: 24px;
      }
      .hero {
        padding: 48px 0 32px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
      }
      .image {
        width: 180px;
        height: 180px;
        border-radius: 20px;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.12);
        margin-bottom: 24px;
      }
      .image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .badge {
        display: inline-block;
        padding: 10px 14px;
        border: 1px solid rgba(255,255,255,0.14);
        border-radius: 999px;
        background: rgba(255,255,255,0.04);
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.72);
      }
      h1 {
        margin: 18px 0 10px;
        font-size: 44px;
        line-height: 1;
      }
      .subtitle {
        font-size: 20px;
        color: rgba(255,255,255,0.78);
        margin: 0 0 16px;
      }
      .record {
        color: rgba(255,255,255,0.7);
        margin-bottom: 22px;
      }
      .record strong { color: #fff; }
      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .tag {
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 999px;
        padding: 10px 14px;
        color: rgba(255,255,255,0.76);
        font-size: 14px;
      }
      .section {
        padding: 32px 0 56px;
      }
      .section-label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: rgba(255,255,255,0.4);
        margin-bottom: 10px;
      }
      .section h2 {
        margin: 0 0 20px;
        font-size: 30px;
      }
      .video {
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 24px;
        overflow: hidden;
        background: rgba(255,255,255,0.04);
      }
      .video iframe {
        width: 100%;
        aspect-ratio: 16 / 9;
        border: 0;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="hero">
        <div class="image">
          <img src="YOUR-PHOTO.jpg" alt="Yusuf-Sami Karpuz" />
        </div>

        <div class="badge">Profil / Kampfsportler</div>
        <h1>Yusuf-Sami Karpuz</h1>
        <p class="subtitle">In Vorarlberg als Kampfsportler bekannt.</p>
        <div class="record">Bilanz: <strong>1-0-0 (1 KO)</strong></div>

        <div class="tags">
          <div class="tag">Vorarlberg</div>
          <div class="tag">Kampfsport</div>
          <div class="tag">Apex Combat Academy</div>
          <div class="tag">Boxen</div>
          <div class="tag">Aktiv</div>
        </div>
      </section>

      <section class="section">
        <div class="section-label">Fight Record</div>
        <h2>Boxkampf — 23.12.2023</h2>
        <div class="video">
          <iframe
            src="https://www.youtube.com/embed/G5kOpxWbt7Q"
            title="Boxing Fight"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
          ></iframe>
        </div>
      </section>
    </div>
  </body>
</html>
